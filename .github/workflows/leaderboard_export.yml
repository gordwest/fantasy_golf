name: Run Leaderboard Export

on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'
  workflow_dispatch: {}

jobs:
  export_leaderboard:
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests "snowflake-snowpark-python[pandas]"

      - name: Validate required secrets
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY || secrets.API_KEY }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          test -n "$RAPIDAPI_KEY" || { echo "Missing GitHub secret: RAPIDAPI_KEY or API_KEY"; exit 1; }
          test -n "$SNOWFLAKE_ACCOUNT" || { echo "Missing GitHub secret: SNOWFLAKE_ACCOUNT"; exit 1; }
          test -n "$SNOWFLAKE_USER" || { echo "Missing GitHub secret: SNOWFLAKE_USER"; exit 1; }
          test -n "$SNOWFLAKE_PASSWORD" || { echo "Missing GitHub secret: SNOWFLAKE_PASSWORD"; exit 1; }
          test -n "$SNOWFLAKE_WAREHOUSE" || { echo "Missing GitHub secret: SNOWFLAKE_WAREHOUSE"; exit 1; }
          test -n "$SNOWFLAKE_DATABASE" || { echo "Missing GitHub secret: SNOWFLAKE_DATABASE"; exit 1; }
          test -n "$SNOWFLAKE_SCHEMA" || { echo "Missing GitHub secret: SNOWFLAKE_SCHEMA"; exit 1; }

      - name: Run leaderboard export
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY || secrets.API_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST || secrets.HOST }}
          RAPIDAPI_BASE_URL: ${{ secrets.RAPIDAPI_BASE_URL || secrets.BASE_URL }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: python api_service/leaderboard_export.py
